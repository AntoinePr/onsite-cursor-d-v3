services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toolexec
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: ./control-plane
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/toolexec
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USAGE_API_URL: http://usage-api:8001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./control-plane/app:/app/app

  worker-1:
    build:
      context: ./worker
    restart: always
    environment:
      CONTROL_PLANE_URL: ws://control-plane:8000/ws/worker
      WORKER_NAME: worker-1
    depends_on:
      - control-plane
    volumes:
      - ./worker/main.py:/app/main.py

  worker-2:
    build:
      context: ./worker
    restart: always
    environment:
      CONTROL_PLANE_URL: ws://control-plane:8000/ws/worker
      WORKER_NAME: worker-2
    depends_on:
      - control-plane
    volumes:
      - ./worker/main.py:/app/main.py

  worker-3:
    build:
      context: ./worker
    restart: always
    environment:
      CONTROL_PLANE_URL: ws://control-plane:8000/ws/worker
      WORKER_NAME: worker-3
    depends_on:
      - control-plane
    volumes:
      - ./worker/main.py:/app/main.py

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  billing-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: billing
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  usage-api:
    build:
      context: ./usage-api
    ports:
      - "8001:8001"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./usage-api/app:/app/app

  cost-backend:
    build:
      context: ./cost-backend
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@billing-db:5432/billing
    depends_on:
      redis:
        condition: service_healthy
      billing-db:
        condition: service_healthy
    volumes:
      - ./cost-backend/app:/app/app
