<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExeCursor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #2a2a3e;
      gap: 12px;
    }

    header h1 { font-size: 30px; font-weight: 600; color: #a78bfa; }

    #connection-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f87171;
      flex-shrink: 0;
    }
    #connection-dot.connected { background: #4ade80; }

    .main-layout {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      order: 2;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #3b3b8f;
      color: #e0e0ff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.streaming::after {
      content: '\u258C';
      animation: blink 0.8s step-end infinite;
      color: #a78bfa;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .message.worker-failure {
      align-self: stretch;
      max-width: 100%;
      background: #3a1e1e;
      border: 1px solid #f87171;
      color: #f87171;
      font-size: 12px;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
    }

    .message.worker-reconnected {
      align-self: stretch;
      max-width: 100%;
      background: #1e3a2f;
      border: 1px solid #4ade80;
      color: #4ade80;
      font-size: 12px;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
    }

    .reconnect-btn {
      align-self: center;
      background: #2a2a3e;
      border: 1px solid #a78bfa;
      color: #a78bfa;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin: 4px auto;
      display: block;
    }
    .reconnect-btn:hover { background: #1a1a30; }
    .reconnect-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .message.status {
      align-self: center;
      background: transparent;
      color: #666;
      font-size: 12px;
      font-style: italic;
      padding: 4px;
    }

    .message.tool-call {
      align-self: flex-start;
      background: #1a1a2e;
      border: 1px solid #3b3b5c;
      border-left: 3px solid #a78bfa;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 12px;
      max-width: 90%;
    }

    .tool-call-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tool-call-header .fn-name { color: #a78bfa; font-weight: 600; }
    .tool-call-header .worker-tag {
      color: #888;
      font-size: 10px;
      text-transform: none;
      letter-spacing: 0;
    }

    .status-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .status-indicator.pending { background: #facc15; animation: pulse 1.2s infinite; }
    .status-indicator.running { background: #60a5fa; animation: pulse 0.8s infinite; }
    .status-indicator.complete { background: #4ade80; }
    .status-indicator.failed { background: #f87171; }
    .status-indicator.retrying { background: #fb923c; animation: pulse 0.6s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .tool-call-result {
      color: #4ade80;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #2a2a3e;
    }

    .tool-call-error { color: #f87171; }

    #input-area {
      padding: 12px 20px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a3e;
      display: flex;
      gap: 10px;
    }

    #message-input {
      flex: 1;
      padding: 10px 14px;
      background: #0f0f0f;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    #message-input:focus { border-color: #a78bfa; }

    #send-btn {
      padding: 10px 18px;
      background: #6d28d9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    #send-btn:hover { background: #7c3aed; }
    #send-btn:disabled { background: #333; cursor: not-allowed; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      background: #141420;
      border-right: 1px solid #2a2a3e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      order: 1;
    }

    .sidebar-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-panel + .sidebar-panel { border-top: 1px solid #2a2a3e; }

    .sidebar-panel-header {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .worker-card {
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #1e1e2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .worker-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .worker-dot.bound { background: #fb923c; }

    .session-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .session-dot.disconnected { background: #f87171; }

    .worker-card .name { font-size: 13px; font-weight: 500; }

    .worker-card .bound-tag {
      font-size: 9px;
      color: #fb923c;
      font-family: 'SF Mono', Menlo, monospace;
      margin-left: auto;
    }

    .cap-tag {
      font-size: 9px;
      background: #2a2a3e;
      color: #a78bfa;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 2px;
    }

    .session-card {
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #1e1e2e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 12px;
    }

    .session-card:hover { background: #2a2a3e; }
    .session-card.active { border: 1px solid #a78bfa; background: #1a1a30; }

    .session-card .session-id {
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 11px;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .session-status-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .session-status-badge.active { background: #1e3a2f; color: #4ade80; }
    .session-status-badge.failed { background: #3a1e1e; color: #f87171; }
    .session-status-badge.past { background: #2a2a2e; color: #888; }
    .session-status-badge.expired { background: #3a1e1e; color: #f87171; }

    .session-kill-btn {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      flex-shrink: 0;
      background: #3a1e1e;
      color: #f87171;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .session-kill-btn:hover { background: #4a2020; color: #ef4444; }

    .new-session-btn {
      width: 100%;
      padding: 6px;
      background: #2a2a3e;
      border: 1px dashed #3b3b5c;
      border-radius: 6px;
      color: #a78bfa;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .new-session-btn:hover { background: #333355; }

    .no-items { color: #555; font-size: 12px; text-align: center; padding: 12px; }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 14px;
    }

    .cost-dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      order: 2;
      background: #0f0f0f;
    }

    .cost-toolbar {
      padding: 12px 24px;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-arrow {
      background: #2a2a3e;
      border: 1px solid #3b3b5c;
      color: #888;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-arrow:hover { background: #333355; color: #a78bfa; }
    .nav-arrow:disabled { opacity: 0.3; cursor: not-allowed; }

    .window-label {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      padding: 0 8px;
      white-space: nowrap;
      min-width: 100px;
      text-align: center;
    }

    .range-pills {
      display: flex;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      overflow: hidden;
    }

    .range-pill {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      background: transparent;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
    }
    .range-pill:hover { color: #a78bfa; background: #222240; }
    .range-pill.active { color: #fff; background: #6d28d9; }
    .range-pill + .range-pill { border-left: 1px solid #2a2a3e; }

    .toolbar-select {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #ccc;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }
    .toolbar-select:hover { border-color: #a78bfa; }

    .cost-summary-row {
      display: flex;
      gap: 24px;
      padding: 12px 24px;
    }

    .cost-summary-card {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 12px 20px;
      min-width: 160px;
    }

    .cost-summary-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #888;
      margin-bottom: 4px;
    }

    .cost-summary-card .value {
      font-size: 22px;
      font-weight: 600;
      font-family: 'SF Mono', Menlo, monospace;
      color: #a78bfa;
    }

    .chart-container {
      flex: 1;
      padding: 0 24px 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .chart-wrapper {
      flex: 1;
      min-height: 300px;
      position: relative;
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
</head>
<body>
  <header>
    <div id="connection-dot" style="display:none;"></div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" style="height: 56px; width: 56px; flex-shrink: 0;">
      <rect width="64" height="64" rx="8" fill="#1a1a2e"/>
      <circle cx="32" cy="30" r="20" fill="none" stroke="#c0c0c0" stroke-width="2"/>
      <circle cx="24" cy="26" r="6" fill="#1a1a2e" stroke="#c0c0c0" stroke-width="1.5"/>
      <circle cx="24" cy="26" r="3" fill="#f87171"/>
      <circle cx="40" cy="26" r="6" fill="#1a1a2e" stroke="#c0c0c0" stroke-width="1.5"/>
      <circle cx="40" cy="26" r="3" fill="#a78bfa"/>
      <line x1="22" y1="16" x2="26" y2="20" stroke="#c0c0c0" stroke-width="1.5"/>
      <line x1="42" y1="16" x2="38" y2="20" stroke="#c0c0c0" stroke-width="1.5"/>
      <path d="M24 38 L28 36 L32 38 L36 36 L40 38" fill="none" stroke="#c0c0c0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="28" y1="36" x2="28" y2="39" stroke="#c0c0c0" stroke-width="1"/>
      <line x1="32" y1="35" x2="32" y2="39" stroke="#c0c0c0" stroke-width="1"/>
      <line x1="36" y1="36" x2="36" y2="39" stroke="#c0c0c0" stroke-width="1"/>
      <path d="M26 30 L32 32 L38 30" fill="none" stroke="#c0c0c0" stroke-width="1.2"/>
    </svg>
    <h1>ExeCursor</h1>
  </header>

  <div class="main-layout">
    <div class="chat-area">
      <div id="chat-container">
        <div id="empty-state" class="empty-state">Create a new session to start</div>
      </div>
      <div id="input-area">
        <input type="text" id="message-input" placeholder="Ask something... (e.g. 'run uname -a on worker-1')" autocomplete="off" />
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div class="sidebar">
      <div id="sessions-panels" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        <div class="sidebar-panel" style="flex: 0 0 auto;">
          <div class="sidebar-panel-header">Workers <span id="worker-count">0</span></div>
          <div class="sidebar-panel-body" id="workers-list"></div>
        </div>
        <div class="sidebar-panel" style="flex: 0 0 auto;">
          <div class="sidebar-panel-header">Active Sessions</div>
          <div class="sidebar-panel-body" id="sessions-list"></div>
        </div>
        <div class="sidebar-panel" style="flex: 1; min-height: 0;">
          <div class="sidebar-panel-header">Past Sessions</div>
          <div class="sidebar-panel-body" id="past-sessions-list"></div>
        </div>
      </div>
      <div style="flex-shrink: 0; border-top: 1px solid #2a2a3e; cursor: pointer; padding: 10px 14px;" onclick="showCostDashboard()" onmouseenter="this.style.background='#1a1a30'" onmouseleave="this.style.background=''">
        <span style="font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #888;">Usage & Cost</span>
      </div>
    </div>

    <div class="cost-dashboard" id="cost-dashboard" style="display: none;">
      <div class="cost-toolbar">
        <div class="toolbar-left">
          <button class="nav-arrow" id="nav-left" onclick="navPeriod(-1)">&lt;</button>
          <span class="window-label" id="window-label"></span>
          <button class="nav-arrow" id="nav-right" onclick="navPeriod(1)" disabled>&gt;</button>
          <div class="range-pills" id="range-pills">
            <button class="range-pill active" data-range="10m" onclick="setRange('10m')">10m</button>
            <button class="range-pill" data-range="1h" onclick="setRange('1h')">1h</button>
            <button class="range-pill" data-range="1d" onclick="setRange('1d')">1d</button>
            <button class="range-pill" data-range="1m" onclick="setRange('1m')">1m</button>
          </div>
        </div>
        <div class="toolbar-right">
          <select class="toolbar-select" id="session-filter-select" onchange="setSessionFilter(this.value)">
            <option value="">All Sessions</option>
          </select>
          <select class="toolbar-select" id="group-by-select" onchange="setGroupBy(this.value)">
            <option value="">Group By: None</option>
            <option value="model">Group By: Model</option>
            <option value="usage_type">Group By: Usage Type</option>
            <option value="provider">Group By: Provider</option>
            <option value="session_id">Group By: Session</option>
          </select>
          <select class="toolbar-select" id="metric-select" onchange="setMetric(this.value)">
            <option value="cost">Metric: Spend</option>
            <option value="usage">Metric: Tokens</option>
          </select>
        </div>
      </div>
      <div class="cost-summary-row">
        <div class="cost-summary-card">
          <div class="label" id="dash-label">Total Spend</div>
          <div class="value" id="dash-total">$0.000000</div>
        </div>
      </div>
      <div class="chart-container">
        <div class="chart-wrapper" id="recharts-mount"></div>
      </div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const connectionDot = document.getElementById('connection-dot');
    const workersList = document.getElementById('workers-list');
    const workerCount = document.getElementById('worker-count');
    const sessionsList = document.getElementById('sessions-list');
    const pastSessionsList = document.getElementById('past-sessions-list');

    const costDashboard = document.getElementById('cost-dashboard');
    const chatArea = document.querySelector('.chat-area');
    const rechartsMount = document.getElementById('recharts-mount');
    const dashTotal = document.getElementById('dash-total');
    const dashLabel = document.getElementById('dash-label');

    let costHistory = [];
    let costGroups = null;
    let costNowIso = null;
    let costDashboardVisible = false;
    let costPollTimer = null;
    let tilePollTimer = null;

    let currentRange = '10m';
    let currentOffset = 0;
    let currentMetric = 'cost';
    let currentGroupBy = null;
    let currentSessionFilter = null;

    let workersAvailable = 0;
    let sessionId = localStorage.getItem('sessionId');
    let ws = null;
    let isProcessing = false;
    const renderedMessageIds = new Set();

    const GROUP_COLORS = ['#6d28d9', '#f59e0b', '#10b981', '#ef4444', '#3b82f6', '#ec4899', '#14b8a6', '#f97316'];

    // ── Cost Dashboard ──

    function friendlyLabel(s) {
      if (!s) return '';
      return s
        .replace(/_/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatCost(v) {
      if (v == null || v === 0) return '$0';
      if (v < 0.001) return '$' + v.toFixed(6);
      if (v < 1) return '$' + v.toFixed(4);
      return '$' + v.toFixed(2);
    }

    function formatTokens(v) {
      if (v == null || v === 0) return '0';
      return Math.round(v).toLocaleString();
    }

    async function fetchHistory() {
      const base = currentMetric === 'cost' ? '/cost' : '/usage';
      let url = `http://${location.hostname}:8002${base}?range=${currentRange}&offset=${currentOffset}`;
      if (currentGroupBy) url += `&group_by=${currentGroupBy}`;
      if (currentSessionFilter) url += `&session_id=${currentSessionFilter}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        costHistory = data.buckets || [];
        costGroups = data.groups || null;
        costNowIso = data.now || null;

        if (currentMetric === 'cost') {
          dashLabel.textContent = 'Total Spend';
          dashTotal.textContent = formatCost(data.window_total);
        } else {
          dashLabel.textContent = 'Total Tokens';
          dashTotal.textContent = formatTokens(data.window_total);
        }

        document.getElementById('nav-right').disabled = (currentOffset <= 0);
        document.getElementById('window-label').textContent = _formatWindowLabel(data.window_start, data.window_end);
        renderCostChart();
      } catch (e) {
        console.error('fetchHistory error:', e);
      }
    }

    async function fetchSidebarTile() {}

    function startCostPolling() {
      if (costPollTimer) return;
      fetchHistory();
      costPollTimer = setInterval(fetchHistory, 5000);
    }

    function stopCostPolling() {
      if (costPollTimer) { clearInterval(costPollTimer); costPollTimer = null; }
    }

    function setRange(r) {
      currentRange = r;
      currentOffset = 0;
      document.querySelectorAll('.range-pill').forEach(p => p.classList.toggle('active', p.dataset.range === r));
      fetchHistory();
    }

    function setMetric(m) {
      currentMetric = m;
      fetchHistory();
    }

    function setGroupBy(g) {
      currentGroupBy = g || null;
      fetchHistory();
    }

    function setSessionFilter(id) {
      currentSessionFilter = id || null;
      fetchHistory();
    }

    async function populateSessionFilter() {
      const sel = document.getElementById('session-filter-select');
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        sel.innerHTML = '<option value="">All Sessions</option>';
        for (const s of data.sessions) {
          const label = s.name || s.id.slice(0, 8);
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = label;
          if (s.id === currentSessionFilter) opt.selected = true;
          sel.appendChild(opt);
        }
      } catch {}
    }

    function navPeriod(dir) {
      currentOffset = Math.max(0, currentOffset - dir);
      fetchHistory();
    }

    function showCostDashboard(pushState = true) {
      costDashboardVisible = true;
      chatArea.style.display = 'none';
      costDashboard.style.display = 'flex';
      if (pushState) history.pushState({ view: 'cost' }, '', '/usage-and-cost');
      populateSessionFilter();
      startCostPolling();
    }

    function showSessionsView(pushState = true) {
      costDashboardVisible = false;
      costDashboard.style.display = 'none';
      chatArea.style.display = 'flex';
      if (pushState) history.pushState({ view: 'sessions' }, '', '/sessions');
      currentSessionFilter = null;
      const sel = document.getElementById('session-filter-select');
      if (sel) sel.value = '';
      stopCostPolling();
    }

    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.view === 'cost') {
        showCostDashboard(false);
      } else {
        showSessionsView(false);
      }
    });

    const rechartsRoot = ReactDOM.createRoot(rechartsMount);

    function renderCostChart() {
      const {
        ResponsiveContainer, ComposedChart, Bar, Line, XAxis, YAxis,
        CartesianGrid, Tooltip, Legend, Cell, ReferenceArea
      } = Recharts;

      const isCost = currentMetric === 'cost';
      const fmt = isCost ? formatCost : formatTokens;

      const nowMs = costNowIso ? new Date(costNowIso).getTime() : Date.now();

      let data;
      if (costGroups && costGroups.length > 0) {
        data = costHistory.map(d => {
          const bucketMs = new Date(d.bucket).getTime();
          const row = { time: _formatBucketTime(d.bucket), cumulative: d.cumulative, future: bucketMs > nowMs };
          if (d.breakdown) {
            for (const g of costGroups) row[g] = d.breakdown[g] || 0;
          }
          return row;
        });
      } else {
        data = costHistory.map(d => {
          const bucketMs = new Date(d.bucket).getTime();
          return {
            time: _formatBucketTime(d.bucket),
            value: d.value,
            cumulative: d.cumulative,
            future: bucketMs > nowMs,
          };
        });
      }

      const CustomTooltip = ({ active, payload, label }) => {
        if (!active || !payload || !payload.length) return null;
        const items = payload.filter(p => p.dataKey !== 'cumulative');
        const cumVal = payload.find(p => p.dataKey === 'cumulative');
        const isFuture = payload[0] && payload[0].payload && payload[0].payload.future;
        return React.createElement('div', {
          style: {
            background: '#1a1a2e', border: '1px solid #2a2a3e',
            borderRadius: '6px', padding: '10px 14px', fontSize: '12px',
            fontFamily: "'SF Mono', Menlo, monospace",
          }
        },
          React.createElement('div', { style: { color: '#888', marginBottom: '6px', fontWeight: 600 } },
            label + (isFuture ? ' (future)' : '')),
          ...items.map((it, i) =>
            React.createElement('div', { key: i, style: { color: it.color || '#a78bfa', marginBottom: '2px' } },
              friendlyLabel(it.name) + ': ' + fmt(it.value))
          ),
          cumVal && React.createElement('div', { style: { color: '#4ade80', marginTop: '4px', borderTop: '1px solid #2a2a3e', paddingTop: '4px' } },
            'Cumulative: ' + fmt(cumVal.value))
        );
      };

      const bars = [];
      if (costGroups && costGroups.length > 0) {
        costGroups.forEach((g, i) => {
          const baseColor = GROUP_COLORS[i % GROUP_COLORS.length];
          bars.push(React.createElement(Bar, {
            key: g, yAxisId: 'val', dataKey: g, name: friendlyLabel(g), stackId: 'stack',
            radius: i === costGroups.length - 1 ? [3, 3, 0, 0] : [0, 0, 0, 0],
            maxBarSize: 40,
            fill: baseColor,
          },
            data.map((entry, idx) =>
              React.createElement(Cell, { key: idx, fill: baseColor, fillOpacity: entry.future ? 0.2 : 1 })
            )
          ));
        });
      } else {
        bars.push(React.createElement(Bar, {
          key: 'value', yAxisId: 'val', dataKey: 'value',
          name: currentMetric === 'cost' ? 'Spend' : 'Tokens',
          radius: [3, 3, 0, 0], maxBarSize: 40,
          fill: '#6d28d9',
        },
          data.map((entry, idx) =>
            React.createElement(Cell, { key: idx, fill: '#6d28d9', fillOpacity: entry.future ? 0.2 : 1 })
          )
        ));
      }

      const futureStartIdx = data.findIndex(d => d.future);
      let futureRefArea = null;
      if (futureStartIdx > 0) {
        futureRefArea = React.createElement(ReferenceArea, {
          x1: data[futureStartIdx].time,
          x2: data[data.length - 1].time,
          yAxisId: 'val',
          fill: '#ffffff',
          fillOpacity: 0.03,
          strokeOpacity: 0,
        });
      }

      const xTickStyle = (value, index) => {
        if (index < data.length && data[index] && data[index].future) {
          return { fill: '#333', fontSize: 10 };
        }
        return { fill: '#555', fontSize: 10 };
      };

      const chart = React.createElement(ResponsiveContainer, { width: '100%', height: '100%' },
        React.createElement(ComposedChart, { data, margin: { top: 8, right: 12, left: 12, bottom: 4 } },
          React.createElement(CartesianGrid, { strokeDasharray: '3 3', stroke: '#2a2a3e', vertical: false }),
          React.createElement(XAxis, {
            dataKey: 'time', tick: { fill: '#555', fontSize: 10 },
            axisLine: { stroke: '#2a2a3e' }, tickLine: false,
          }),
          React.createElement(YAxis, {
            yAxisId: 'val', tick: { fill: '#555', fontSize: 10 },
            axisLine: false, tickLine: false,
            tickFormatter: fmt, width: 70,
          }),
          React.createElement(YAxis, {
            yAxisId: 'cum', orientation: 'right',
            tick: { fill: '#555', fontSize: 10 },
            axisLine: false, tickLine: false,
            tickFormatter: fmt, width: 70,
          }),
          React.createElement(Tooltip, { content: React.createElement(CustomTooltip), cursor: { fill: 'rgba(167,139,250,0.08)' } }),
          React.createElement(Legend, {
            wrapperStyle: { fontSize: '11px', color: '#888', paddingTop: '4px' },
            formatter: (value) => friendlyLabel(value),
          }),
          futureRefArea,
          ...bars,
          React.createElement(Line, {
            yAxisId: 'cum', dataKey: 'cumulative', name: 'Cumulative', type: 'monotone',
            stroke: '#4ade80', strokeWidth: 2, dot: false,
            activeDot: { r: 4, fill: '#4ade80', stroke: '#0f0f0f', strokeWidth: 2 },
          }),
        )
      );

      rechartsRoot.render(chart);
    }

    function _formatBucketTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (currentRange === '1m') {
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      } else if (currentRange === '1d') {
        return d.getHours().toString().padStart(2, '0') + ':00';
      } else {
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
      }
    }

    function _formatWindowLabel(startIso, endIso) {
      if (!startIso || !endIso) return '';
      const s = new Date(startIso);
      const e = new Date(endIso);
      const utcTime = (d) => d.getUTCHours().toString().padStart(2, '0') + ':' + d.getUTCMinutes().toString().padStart(2, '0');
      const utcMonthDay = (d) => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
      const utcMonthYear = (d) => d.toLocaleDateString('en-US', { month: 'short', year: 'numeric', timeZone: 'UTC' });

      if (currentRange === '10m') {
        return utcTime(s) + ' – ' + utcTime(e);
      } else if (currentRange === '1h') {
        return utcMonthDay(s) + ', ' + utcTime(s) + ' – ' + utcTime(e);
      } else if (currentRange === '1d') {
        return utcMonthDay(s);
      } else if (currentRange === '1m') {
        return utcMonthYear(s);
      }
      return '';
    }

    // ── Chat WebSocket ──

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws/chat/${sessionId}`);

      ws.onopen = () => {
        connectionDot.className = 'connected';
        refreshWorkers();
        refreshSessions();
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };

      ws.onclose = () => {
        connectionDot.className = '';
        if (!viewingPastSession && sessionId) setTimeout(connect, 2000);
      };

      ws.onerror = () => {};
    }

    function resetCostPanel() {
      dashTotal.textContent = '$0.000000';
      costHistory = [];
      costGroups = null;
      if (costDashboardVisible) renderCostChart();
    }

    function handleMessage(data) {
      if (data.message_id) {
        if (renderedMessageIds.has(data.message_id)) return;
        renderedMessageIds.add(data.message_id);
      }

      switch (data.type) {
        case 'session_status':
          if (data.is_busy) setProcessing(true);
          break;

        case 'history_replay':
          chatContainer.innerHTML = '';
          renderedMessageIds.clear();
          renderHistory(data.messages);
          break;

        case 'status':
          addMessage(data.content, 'status');
          break;

        case 'assistant_message':
          addMessage(data.content, 'assistant');
          setProcessing(false);
          break;

        case 'assistant_token':
          appendToken(data.content);
          break;

        case 'assistant_message_done':
          finalizeStreamingMessage();
          break;

        case 'tool_call_start':
          addToolCall(data.tool_call_id, data.function_name, data.arguments, data.status || 'pending');
          break;

        case 'tool_call_update':
          updateToolCallStatus(data.tool_call_id, data.status, data.worker_name, data.error);
          break;

        case 'tool_call_result':
          updateToolCallResult(data.tool_call_id, data.result, data.status || 'complete', data.worker_name);
          break;

        case 'worker_failure':
          addMessage(`Worker failure: ${data.worker_name} disconnected`, 'worker-failure');
          addReconnectButton();
          setProcessing(false);
          refreshWorkers();
          refreshSessions();
          break;

        case 'worker_reconnected':
          addMessage('Reconnected to new sandbox', 'worker-reconnected');
          refreshWorkers();
          refreshSessions();
          break;

        case 'session_name_update':
          refreshSessions();
          break;

        case 'error':
          addMessage(`Error: ${data.content}`, 'status');
          setProcessing(false);
          break;
      }
    }

    function renderHistory(messages) {
      for (const m of messages) {
        if (m.role === 'user') {
          addMessage(m.content, 'user');
        } else if (m.role === 'assistant') {
          if (m.content) addMessage(m.content, 'assistant');
          if (m.tool_calls) {
            for (const tc of m.tool_calls) {
              let args = {};
              try { args = JSON.parse(tc.function.arguments); } catch {}
              addToolCall(tc.id, tc.function.name, args, 'complete');
            }
          }
        } else if (m.role === 'tool') {
          updateToolCallResult(m.tool_call_id, m.content, 'complete', '');
        } else if (m.role === 'system') {
          try {
            const ev = JSON.parse(m.content);
            if (ev.type === 'worker_failure') {
              addMessage(`Worker failure: ${ev.worker_name} disconnected`, 'worker-failure');
              if (!viewingPastSession) {
                addReconnectButton();
              }
            } else if (ev.type === 'worker_reconnected') {
              addMessage('Reconnected to new sandbox', 'worker-reconnected');
              const existingBtn = chatContainer.querySelector('.reconnect-btn');
              if (existingBtn) existingBtn.remove();
            }
          } catch {}
        }
      }
      setProcessing(false);
    }

    // ── Chat rendering ──

    function addMessage(content, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = content;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function addReconnectButton() {
      const existing = chatContainer.querySelector('.reconnect-btn');
      if (existing) existing.remove();
      const btn = document.createElement('button');
      btn.className = 'reconnect-btn';
      btn.textContent = 'Reconnect to new sandbox';
      btn.onclick = () => reconnectSession(btn);
      chatContainer.appendChild(btn);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function reconnectSession(btn) {
      if (btn) { btn.disabled = true; btn.textContent = 'Reconnecting...'; }
      try {
        const res = await fetch(`/api/sessions/${sessionId}/reconnect`, { method: 'POST' });
        if (res.ok) {
          if (btn) btn.remove();
        } else {
          addMessage('No available workers to reconnect', 'status');
          if (btn) { btn.disabled = false; btn.textContent = 'Reconnect to new sandbox'; }
        }
      } catch {
        addMessage('Reconnect failed', 'status');
        if (btn) { btn.disabled = false; btn.textContent = 'Reconnect to new sandbox'; }
      }
    }

    function addToolCall(toolCallId, functionName, args, status) {
      if (document.getElementById(`tc-${toolCallId}`)) return;

      const div = document.createElement('div');
      div.className = 'message tool-call';
      div.id = `tc-${toolCallId}`;

      const hdr = document.createElement('div');
      hdr.className = 'tool-call-header';
      hdr.innerHTML = `<span class="status-indicator ${status}" id="tc-status-${toolCallId}"></span>` +
        `<span class="fn-name">${functionName}</span>` +
        `<span class="worker-tag" id="tc-worker-${toolCallId}"></span>`;
      div.appendChild(hdr);

      const argsDiv = document.createElement('div');
      argsDiv.textContent = JSON.stringify(args, null, 2);
      div.appendChild(argsDiv);

      const resultDiv = document.createElement('div');
      resultDiv.className = 'tool-call-result';
      resultDiv.id = `tc-result-${toolCallId}`;
      if (status === 'pending' || status === 'running') {
        resultDiv.textContent = status === 'pending' ? 'Dispatching...' : 'Executing...';
      }
      div.appendChild(resultDiv);

      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function updateToolCallStatus(toolCallId, status, workerName, error) {
      const indicator = document.getElementById(`tc-status-${toolCallId}`);
      if (indicator) indicator.className = `status-indicator ${status}`;

      const workerTag = document.getElementById(`tc-worker-${toolCallId}`);
      if (workerTag && workerName) workerTag.textContent = `on ${workerName}`;

      const resultDiv = document.getElementById(`tc-result-${toolCallId}`);
      if (resultDiv) {
        if (status === 'running') resultDiv.textContent = `Executing on ${workerName}...`;
        else if (status === 'retrying') resultDiv.textContent = `${error || 'Retrying'}... reassigning to another worker`;
      }
    }

    function updateToolCallResult(toolCallId, result, status, workerName) {
      const indicator = document.getElementById(`tc-status-${toolCallId}`);
      if (indicator) indicator.className = `status-indicator ${status}`;

      const workerTag = document.getElementById(`tc-worker-${toolCallId}`);
      if (workerTag && workerName) workerTag.textContent = `on ${workerName}`;

      const resultDiv = document.getElementById(`tc-result-${toolCallId}`);
      if (resultDiv) {
        try {
          const parsed = JSON.parse(result);
          if (parsed.error) {
            resultDiv.className = 'tool-call-result tool-call-error';
            resultDiv.textContent = `Error: ${parsed.error}`;
          } else {
            resultDiv.textContent = JSON.stringify(parsed, null, 2);
          }
        } catch {
          resultDiv.textContent = result;
        }
      }
    }

    let streamingBubble = null;

    function appendToken(token) {
      if (!streamingBubble) {
        streamingBubble = document.createElement('div');
        streamingBubble.className = 'message assistant streaming';
        chatContainer.appendChild(streamingBubble);
      }
      streamingBubble.textContent += token;
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function finalizeStreamingMessage() {
      if (streamingBubble) {
        streamingBubble.classList.remove('streaming');
        streamingBubble = null;
      }
      setProcessing(false);
    }

    function setProcessing(value) {
      isProcessing = value;
      if (viewingPastSession || !sessionId) {
        sendBtn.disabled = true;
        messageInput.disabled = true;
      } else {
        sendBtn.disabled = value;
        messageInput.disabled = value;
        if (!value) messageInput.focus();
      }
    }

    function sendMessage() {
      const content = messageInput.value.trim();
      if (!content || isProcessing || !ws || ws.readyState !== WebSocket.OPEN) return;
      addMessage(content, 'user');
      ws.send(JSON.stringify({ type: 'user_message', content }));
      messageInput.value = '';
      setProcessing(true);
    }

    // ── Sidebar: Workers ──

    async function refreshWorkers() {
      try {
        const res = await fetch('/api/workers');
        const data = await res.json();
        workerCount.textContent = data.workers.length;
        workersAvailable = data.workers.filter(w => !w.session_id).length;
        if (data.workers.length === 0) {
          workersList.innerHTML = '<div class="no-items">No workers connected</div>';
        } else {
          data.workers.sort((a, b) => {
            const numA = parseInt(a.name.replace(/\D/g, '')) || 0;
            const numB = parseInt(b.name.replace(/\D/g, '')) || 0;
            return numA - numB;
          });
          workersList.innerHTML = data.workers.map(w => {
            const isBound = !!w.session_id;
            const displayName = w.name.replace(/^worker-(\d+)$/i, 'Worker $1');
            return `
            <div class="worker-card">
              <span class="worker-dot ${isBound ? 'bound' : ''}"></span>
              <span class="name">${displayName}</span>
            </div>`;
          }).join('');
        }
      } catch {
        workersList.innerHTML = '<div class="no-items">Error loading</div>';
      }
    }

    // ── Sidebar: Sessions ──

    async function refreshSessions() {
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();

        const activeSessions = data.sessions.filter(s => s.status === 'active' || s.status === 'failed');
        const pastSessions = data.sessions.filter(s => s.status !== 'active' && s.status !== 'failed');

        const canCreate = workersAvailable > 0;
        let activeHtml = canCreate
          ? '<button class="new-session-btn" onclick="newSession()">+ New Session</button>'
          : '<button class="new-session-btn" disabled style="opacity:0.4;cursor:not-allowed;">All workers busy</button>';

        if (activeSessions.length === 0) {
          activeHtml += '<div class="no-items">No active sessions</div>';
        } else {
          for (const s of activeSessions) {
            const isCurrent = s.id === sessionId;
            activeHtml += renderSessionCard(s, isCurrent);
          }
        }
        sessionsList.innerHTML = activeHtml;

        if (pastSessions.length === 0) {
          pastSessionsList.innerHTML = '<div class="no-items">No past sessions</div>';
        } else {
          pastSessionsList.innerHTML = pastSessions.map(s => renderSessionCard(s, s.id === sessionId)).join('');
        }
      } catch {
        sessionsList.innerHTML = '<div class="no-items">Error loading</div>';
        pastSessionsList.innerHTML = '';
      }
    }

    function renderSessionCard(s, isCurrent) {
      const displayName = s.name || s.id.slice(0, 8);
      const isActive = s.status === 'active' || s.status === 'failed';
      const dotClass = (s.status === 'failed' || !isActive) ? 'session-dot disconnected' : 'session-dot';
      const dot = `<span class="${dotClass}"></span>`;
      const killBtn = isActive
        ? `<button class="session-kill-btn" onclick="event.stopPropagation(); deleteSession('${s.id}')" title="Kill session">Kill</button>`
        : '';
      return `
        <div class="session-card ${isCurrent ? 'active' : ''}" onclick="switchSession('${s.id}', '${s.status}')">
          ${dot}
          <span class="session-id">${displayName}</span>
          ${killBtn}
        </div>`;
    }

    async function newSession() {
      if (workersAvailable <= 0) {
        addMessage('No available workers. Delete a session to free one up.', 'status');
        return;
      }
      viewingPastSession = false;
      sessionId = crypto.randomUUID();
      localStorage.setItem('sessionId', sessionId);
      chatContainer.innerHTML = '';
      renderedMessageIds.clear();
      hideEmptyState();
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.placeholder = "Ask something... (e.g. 'run uname -a on worker-1')";
      resetCostPanel();
      if (ws) ws.close();
      connect();
      refreshSessions();
    }

    let viewingPastSession = false;

    function switchSession(id, status) {
      if (id === sessionId && !costDashboardVisible) return;
      if (costDashboardVisible) showSessionsView();
      sessionId = id;
      localStorage.setItem('sessionId', id);
      chatContainer.innerHTML = '';
      renderedMessageIds.clear();
      hideEmptyState();
      resetCostPanel();

      if (status && status !== 'active' && status !== 'failed') {
        viewingPastSession = true;
        if (ws) { ws.onclose = null; ws.close(); ws = null; }
        viewPastSession(id);
      } else {
        viewingPastSession = false;
        if (ws) ws.close();
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.placeholder = "Ask something... (e.g. 'run uname -a on worker-1')";
        connect();
      }
      refreshSessions();
    }

    async function viewPastSession(id) {
      connectionDot.className = '';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      messageInput.placeholder = 'Read-only: this session has ended';
      try {
        const res = await fetch(`/api/sessions/${id}/messages`);
        const data = await res.json();
        renderHistory(data.messages);
      } catch {
        addMessage('Failed to load session history', 'status');
      }
    }

    async function deleteSession(id) {
      await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
      if (id === sessionId) {
        sessionId = null;
        localStorage.removeItem('sessionId');
        if (ws) { ws.onclose = null; ws.close(); ws = null; }
        chatContainer.innerHTML = '';
        renderedMessageIds.clear();
        showEmptyState();
      }
      refreshWorkers();
      refreshSessions();
    }

    // ── Init ──

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    setInterval(refreshWorkers, 5000);
    setInterval(refreshSessions, 5000);
    tilePollTimer = setInterval(fetchSidebarTile, 5000);
    fetchSidebarTile();

    function showEmptyState() {
      const el = document.getElementById('empty-state');
      if (!el) {
        chatContainer.innerHTML = '<div id="empty-state" class="empty-state">Create a new session to start</div>';
      }
      messageInput.disabled = true;
      sendBtn.disabled = true;
      messageInput.placeholder = 'Create a new session to start';
    }

    function hideEmptyState() {
      const el = document.getElementById('empty-state');
      if (el) el.remove();
    }

    refreshWorkers();
    refreshSessions();
    if (sessionId) {
      hideEmptyState();
      connect();
    } else {
      showEmptyState();
    }

    if (location.pathname === '/usage-and-cost') {
      showCostDashboard(false);
    } else {
      history.replaceState({ view: 'sessions' }, '', location.pathname === '/sessions' ? '/sessions' : location.pathname);
    }
  </script>
</body>
</html>
